<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MKCode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        surface: '#ffffff',
                        panel: '#f9fafb',
                        border: '#e5e7eb',
                        'border-hover': '#d1d5db',
                        primary: '#6366f1',
                        'primary-dim': '#4f46e5',
                        muted: '#9ca3af',
                        'muted-light': '#6b7280',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                },
            },
        };
    </script>
</head>
<body class="h-dvh bg-surface text-gray-800 font-sans antialiased overflow-hidden">
<div class="flex h-full" x-data="chatApp">

    <!-- Source Popup Modal -->
    <div x-show="showSourcesModal" class="fixed inset-0 z-50 flex items-end sm:items-center justify-center" x-cloak>
        <div class="fixed inset-0 bg-black/30 backdrop-blur-sm" @click="closeSources()"></div>
        <div class="relative bg-white rounded-t-2xl sm:rounded-2xl shadow-2xl w-full sm:max-w-xl max-h-[80vh] sm:max-h-[70vh] overflow-hidden flex flex-col z-10" x-show="showSourcesModal" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 translate-y-4 sm:scale-95" x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100">
            <div class="flex items-center justify-between px-5 py-4 border-b border-border shrink-0">
                <div class="flex items-center gap-2.5">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <span class="text-sm font-semibold text-gray-900">Sources</span>
                    <span class="text-xs text-muted" x-text="'(' + activeSources.length + ')'"></span>
                </div>
                <button class="p-1.5 rounded-lg text-muted-light hover:text-gray-700 hover:bg-gray-100 transition-colors" @click="closeSources()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="flex-1 overflow-y-auto scrollbar-thin p-4 space-y-2">
                <template x-for="(src, i) in activeSources" :key="i">
                    <a :href="src.url" target="_blank" rel="noopener noreferrer" class="flex gap-3 p-3.5 rounded-xl border border-border hover:border-primary/30 hover:bg-primary/[0.02] transition-all group">
                        <div class="w-8 h-8 rounded-lg bg-gray-100 shrink-0 flex items-center justify-center text-xs font-bold text-gray-500 overflow-hidden">
                            <img :src="'https://www.google.com/s2/favicons?domain=' + getDomain(src.url) + '&sz=64'" :alt="getDomain(src.url)" class="w-5 h-5" loading="lazy" @error="$el.style.display='none'">
                        </div>
                        <div class="min-w-0 flex-1">
                            <div class="text-sm font-medium text-gray-900 truncate group-hover:text-primary transition-colors" x-text="src.title"></div>
                            <div class="text-xs text-muted truncate mt-0.5" x-text="getDomain(src.url)"></div>
                            <div class="text-xs text-muted-light mt-1 line-clamp-2" x-text="src.snippet"></div>
                        </div>
                        <svg class="shrink-0 mt-1 opacity-0 group-hover:opacity-100 transition-opacity text-muted" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                    </a>
                </template>
                <p x-show="activeSources.length === 0" class="text-sm text-muted text-center py-8">No sources available</p>
            </div>
        </div>
    </div>

    <!-- Sidebar Overlay -->
    <div x-show="sidebarOpen" class="fixed inset-0 bg-black/15 z-20 md:hidden backdrop-blur-sm" @click="sidebarOpen = false"></div>

    <!-- Sidebar -->
    <aside class="w-[80vw] max-w-[18rem] md:w-72 md:min-w-[18rem] glass-sidebar border-r border-border flex flex-col z-30 transition-all duration-300 ease-[cubic-bezier(0.16,1,0.3,1)] fixed md:relative inset-y-0 left-0 shadow-xl md:shadow-none"
           :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'">
        <div class="flex items-center justify-between px-4 h-14 border-b border-border shrink-0">
            <div class="flex items-center gap-2.5">
                <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-primary to-indigo-400 flex items-center justify-center text-xs font-bold text-white shadow-sm shadow-primary/20">Mk</div>
                <span class="text-base font-semibold tracking-tight text-gray-900">MKCode</span>
            </div>
            <button class="md:hidden p-2 rounded-xl text-muted-light hover:text-gray-700 hover:bg-gray-100 transition-colors" @click="sidebarOpen = false">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>

        <div class="p-3">
            <button class="w-full flex items-center gap-2.5 px-3.5 py-2.5 rounded-xl text-sm font-medium text-gray-700 bg-white border border-border hover:border-primary/30 hover:text-primary hover:bg-primary/[0.04] transition-all shadow-sm" @click="newChat">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                New chat
            </button>
        </div>

        <div class="flex-1 overflow-y-auto px-2 space-y-0.5 scrollbar-thin">
            <template x-for="chat in chats" :key="chat.id">
                <div class="flex items-center gap-2.5 px-3.5 py-2.5 rounded-xl cursor-pointer text-sm text-muted-light hover:text-gray-900 hover:bg-white transition-colors border border-transparent hover:border-border group"
                     :class="{ 'bg-white border-border shadow-sm text-gray-900': chat.id === currentChatId }"
                     @click="selectChat(chat.id)">
                    <svg class="shrink-0" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    <span class="truncate flex-1" x-text="chat.title || 'New chat'"></span>
                    <button class="opacity-0 group-hover:opacity-100 p-1 rounded-md text-muted hover:text-red-500 hover:bg-red-50 transition-all" @click.stop="deleteChat(chat.id, $event)">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/></svg>
                    </button>
                </div>
            </template>
        </div>

        <div class="px-4 py-3.5 border-t border-border flex items-center gap-2 text-xs text-muted shrink-0">
            <span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span>
            MKCode v1
        </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col min-w-0 bg-white">
        <!-- Header -->
        <header class="h-14 border-b border-border bg-white/80 backdrop-blur-sm flex items-center justify-between px-4 shrink-0 sticky top-0 z-10">
            <div class="flex items-center gap-3">
                <button class="md:hidden p-2 rounded-xl text-muted-light hover:text-gray-700 hover:bg-gray-100 transition-colors" @click="sidebarOpen = true">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <div class="flex items-center gap-2" x-show="currentChatId">
                    <span class="text-xs font-medium text-muted-light" x-text="model"></span>
                    <span class="text-muted">·</span>
                    <span class="text-xs text-muted" x-text="messages.length + ' messages'"></span>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button class="hidden md:flex p-2 rounded-xl text-muted-light hover:text-gray-700 hover:bg-gray-100 transition-colors" @click="sidebarOpen = !sidebarOpen">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
            </div>
        </header>

        <!-- Messages -->
        <div class="flex-1 overflow-y-auto scrollbar-thin" x-ref="chatContainer" @click="if(window.innerWidth <= 768) sidebarOpen = false">
            <div class="max-w-3xl mx-auto px-3 sm:px-6 py-6 sm:py-10">

                <!-- Welcome -->
                <div x-show="!currentChatId && messages.length === 0" class="flex flex-col items-center justify-center min-h-[60vh] text-center px-4">
                    <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-primary to-indigo-400 flex items-center justify-center text-2xl font-bold text-white shadow-lg shadow-primary/20 mb-5">Mk</div>
                    <h1 class="text-2xl sm:text-3xl font-semibold tracking-tight text-gray-900 mb-1">MKCode</h1>
                    <p class="text-sm text-muted-light mb-8">AI Agent Platform</p>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-2.5 w-full max-w-lg">
                        <button class="welcome-card text-left px-4 py-3.5 rounded-xl border border-border bg-white hover:border-primary/30 transition-all text-sm text-muted-light hover:text-gray-900 shadow-sm" @click="selectSuggestion('Build a React todo app with dark mode and local storage')">
                            <span class="block mb-2 text-primary">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                            </span>
                            Build a React app
                        </button>
                        <button class="welcome-card text-left px-4 py-3.5 rounded-xl border border-border bg-white hover:border-primary/30 transition-all text-sm text-muted-light hover:text-gray-900 shadow-sm" @click="selectSuggestion('Latest AI agent frameworks 2026')">
                            <span class="block mb-2 text-primary">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
                            </span>
                            Research AI frameworks
                        </button>
                        <button class="welcome-card text-left px-4 py-3.5 rounded-xl border border-border bg-white hover:border-primary/30 transition-all text-sm text-muted-light hover:text-gray-900 shadow-sm" @click="selectSuggestion('Create a FastAPI backend with async endpoints')">
                            <span class="block mb-2 text-primary">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                            </span>
                            FastAPI backend
                        </button>
                        <button class="welcome-card text-left px-4 py-3.5 rounded-xl border border-border bg-white hover:border-primary/30 transition-all text-sm text-muted-light hover:text-gray-900 shadow-sm" @click="selectSuggestion('Explain and implement quicksort')">
                            <span class="block mb-2 text-primary">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
                            </span>
                            Algorithm
                        </button>
                    </div>
                </div>

                <!-- Messages -->
                <template x-for="(msg, i) in messages" :key="msg.id">
                    <div class="mb-5 last:mb-0" x-data="{ show: false }" x-init="setTimeout(() => show = true, 10)">
                        <div class="flex gap-3 items-start" :class="msg.role === 'user' ? 'flex-row-reverse' : ''" x-show="show" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0">
                            <!-- Avatar -->
                            <div class="w-8 h-8 rounded-xl shrink-0 mt-0.5 flex items-center justify-center text-xs font-semibold shadow-sm"
                                 :class="msg.role === 'user' ? 'bg-gray-100 text-gray-600' : 'bg-gradient-to-br from-primary to-indigo-400 text-white shadow-primary/10'"
                                 x-text="msg.role === 'user' ? 'U' : 'Mk'"></div>

                            <!-- Bubble -->
                            <div class="min-w-0 max-w-[88%] sm:max-w-[78%]"
                                 :class="msg.role === 'user' ? '' : 'w-full'">

                                <!-- Thinking block (only for last assistant message) -->
                                <template x-if="msg.role === 'assistant' && i === messages.length - 1">
                                    <!-- During thinking: full block with animation -->
                                    <div x-show="isThinking && thinkingContent" class="thinking-block mb-3">
                                        <div class="thinking-header">
                                            <div class="flex items-center gap-2 flex-1">
                                                <div class="thinking-dots">
                                                    <span class="thinking-dot"></span>
                                                    <span class="thinking-dot"></span>
                                                    <span class="thinking-dot"></span>
                                                </div>
                                                <span class="text-xs font-medium text-primary">Thinking</span>
                                                <span class="thinking-fast ml-0.5">...</span>
                                            </div>
                                        </div>
                                        <div x-show="thinkingOpen" x-collapse.duration.200ms>
                                            <div class="thinking-content scrollbar-thin" x-text="thinkingContent"></div>
                                        </div>
                                    </div>

                                    <!-- After thinking done: clickable badge -->
                                    <div x-show="thinkingDone && thinkingContent && msg.content" class="mb-2">
                                        <button @click="thinkingOpen = !thinkingOpen" class="inline-flex items-center gap-1.5 text-[11px] font-medium text-muted-light hover:text-primary transition-colors cursor-pointer">
                                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
                                            <span x-text="thinkingOpen ? 'Hide thinking' : 'Show thinking'"></span>
                                        </button>
                                        <div x-show="thinkingOpen" x-collapse.duration.200ms class="mt-1.5">
                                            <div class="thinking-block">
                                                <div class="thinking-content max-h-48 scrollbar-thin" x-text="thinkingContent"></div>
                                            </div>
                                        </div>
                                    </div>
                                </template>

                                <!-- Final Version label -->
                                <div x-show="msg.role === 'assistant' && i === messages.length - 1 && thinkingDone && msg.content" class="final-version-label mb-2">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
                                    Final Version
                                </div>

                                <!-- User bubble -->
                                <div x-show="msg.role === 'user'"
                                     class="bg-gray-100 rounded-2xl px-4 py-2.5 text-gray-800 text-sm leading-relaxed shadow-sm">
                                    <div class="message-content" x-html="formatContent(msg.content)"></div>
                                </div>

                                <!-- Assistant response -->
                                <div x-show="msg.role === 'assistant'"
                                     class="text-gray-700 text-sm leading-relaxed">
                                    <div class="message-content" x-html="formatContent(msg.content)"></div>

                                    <!-- Source chips -->
                                    <template x-if="msg.sources && msg.sources.length > 0">
                                        <div class="mt-3 flex flex-wrap gap-1.5">
                                            <template x-for="(src, si) in msg.sources.slice(0, 4)" :key="si">
                                                <a :href="src.url" target="_blank" rel="noopener noreferrer"
                                                   class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[11px] font-medium bg-gray-50 border border-border text-muted-light hover:bg-primary/[0.04] hover:border-primary/30 hover:text-primary transition-all">
                                                    <img :src="'https://www.google.com/s2/favicons?domain=' + getDomain(src.url) + '&sz=32'" class="w-3.5 h-3.5 rounded" loading="lazy" @error="$el.style.display='none'" :alt="getDomain(src.url)">
                                                    <span class="truncate max-w-[100px]" x-text="getDomain(src.url)"></span>
                                                </a>
                                            </template>
                                            <button x-show="msg.sources.length > 4"
                                                    @click="openSources(msg.sources)"
                                                    class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-[11px] font-medium bg-primary/[0.06] border border-primary/20 text-primary hover:bg-primary/[0.1] transition-all">
                                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                                                +<span x-text="msg.sources.length - 4"></span> more
                                            </button>
                                        </div>
                                    </template>

                                    <!-- Action buttons -->
                                    <div x-show="msg.role === 'assistant' && msg.content && !(i === messages.length - 1 && streaming)"
                                         class="mt-3 flex items-center gap-0.5 -ml-1.5">
                                        <button @click="toggleLike(i)" class="p-1.5 rounded-lg transition-all"
                                                :class="msg.liked ? 'text-primary bg-primary/[0.06]' : 'text-muted-light hover:text-gray-700 hover:bg-gray-100'">
                                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>
                                        </button>
                                        <button @click="toggleDislike(i)" class="p-1.5 rounded-lg transition-all"
                                                :class="msg.disliked ? 'text-red-500 bg-red-50' : 'text-muted-light hover:text-gray-700 hover:bg-gray-100'">
                                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3z"/><line x1="17" y1="2" x2="20" y2="2"/></svg>
                                        </button>
                                        <button @click="regenerateLast()" class="p-1.5 rounded-lg text-muted-light hover:text-gray-700 hover:bg-gray-100 transition-all">
                                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                                        </button>
                                        <button @click="retryLast()" class="p-1.5 rounded-lg text-muted-light hover:text-primary hover:bg-primary/[0.06] transition-all" title="Retry">
                                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
                                        </button>
                                        <button x-show="msg.sources && msg.sources.length > 0" @click="openSources(msg.sources)" class="p-1.5 rounded-lg text-muted-light hover:text-primary hover:bg-primary/[0.06] transition-all">
                                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- Searching indicator -->
                <div x-show="isSearching" class="flex gap-3 mb-5">
                    <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-primary to-indigo-400 flex items-center justify-center text-xs font-semibold text-white shadow-sm shrink-0">Mk</div>
                    <div class="flex items-center gap-2.5 pt-1">
                        <div class="search-spinner">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round">
                                <circle cx="11" cy="11" r="8" stroke-dasharray="32" stroke-dashoffset="32" class="spinner-circle"/>
                                <line x1="21" y1="21" x2="16.65" y2="16.65" class="spinner-handle"/>
                            </svg>
                        </div>
                        <span class="text-sm text-muted-light font-medium">Searching the web...</span>
                        <div class="thinking-dots">
                            <span class="thinking-dot"></span>
                            <span class="thinking-dot"></span>
                            <span class="thinking-dot"></span>
                        </div>
                    </div>
                </div>

                <!-- Typing -->
                <div x-show="streaming && !isThinking && !isSearching" class="flex gap-3 mb-5">
                    <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-primary to-indigo-400 flex items-center justify-center text-xs font-semibold text-white shadow-sm shrink-0">Mk</div>
                    <div class="flex gap-1.5 items-center pt-2.5">
                        <span class="w-2 h-2 rounded-full bg-primary/40 animate-bounce" style="animation-delay:0ms"></span>
                        <span class="w-2 h-2 rounded-full bg-primary/40 animate-bounce" style="animation-delay:150ms"></span>
                        <span class="w-2 h-2 rounded-full bg-primary/40 animate-bounce" style="animation-delay:300ms"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Input -->
        <div class="border-t border-border bg-white px-3 sm:px-4 pb-4 pt-3 shrink-0">
            <div class="max-w-3xl mx-auto">

                <!-- Toggles -->
                <div class="flex items-center gap-2 mb-2.5 px-1">
                    <button class="tool-toggle" :class="{ 'active': searchEnabled }" @click="searchEnabled = !searchEnabled">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        Search
                    </button>
                    <button class="tool-toggle" :class="{ 'active': agentsEnabled }" @click="agentsEnabled = !agentsEnabled">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2a4 4 0 0 0-4 4v2h8V6a4 4 0 0 0-4-4z"/><path d="M16 8v2a4 4 0 0 1-8 0V8"/><path d="M4 14h16v2a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4v-2z"/></svg>
                        Agents
                    </button>
                    <div class="flex-1"></div>
                    <span class="text-[10px] text-muted" x-show="!streaming && currentChatId">Shift+Enter for new line</span>
                </div>

                <div class="flex items-end gap-2 bg-panel border border-border rounded-2xl px-4 py-3 focus-within:border-primary/50 focus-within:ring-2 focus-within:ring-primary/10 transition-all shadow-sm">
                    <textarea x-model="input"
                              @keydown.enter.prevent="if(!$event.shiftKey) sendMessage()"
                              placeholder="Message MKCode..."
                              rows="1"
                              x-ref="textarea"
                              :disabled="streaming"
                              class="flex-1 bg-transparent border-none outline-none resize-none text-sm text-gray-800 placeholder-gray-400 font-sans leading-relaxed max-h-48"
                              @input="$refs.textarea.style.height = 'auto'; $refs.textarea.style.height = Math.min($refs.textarea.scrollHeight, 192) + 'px'">
                    </textarea>
                    <button @click="sendMessage" :disabled="!input.trim() || streaming"
                            class="shrink-0 w-9 h-9 rounded-xl flex items-center justify-center transition-all"
                            :class="input.trim() && !streaming ? 'bg-primary text-white hover:bg-primary-dim shadow-sm shadow-primary/20' : 'bg-gray-100 text-gray-400'">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                </div>
                <p class="text-[11px] text-gray-400 text-center mt-2">
                    MKCode may produce inaccurate information.
                    <span x-show="searchEnabled" class="text-primary font-medium">· Web search on</span>
                    <span x-show="agentsEnabled" class="text-indigo-500 font-medium">· Agents on</span>
                </p>
            </div>
        </div>
    </main>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
