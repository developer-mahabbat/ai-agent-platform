<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MKCode — AI Agent Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        warm: '#F8F7F4',
                        surface: '#FFFFFF',
                        elevated: '#FAFAF8',
                        accent: '#8B5CF6',
                        'accent-light': '#A78BFA',
                        'accent-dark': '#7C3AED',
                        'accent-bg': '#F5F3FF',
                        primary: '#1A1A1A',
                        secondary: '#6B6B6B',
                        muted: '#9E9E9E',
                        border: '#E8E6E1',
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                },
            },
        };
    </script>
</head>
<body style="background:var(--bg-warm);color:var(--text-primary);-webkit-font-smoothing:antialiased;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px" x-data="chatApp">

    <!-- Source Popup -->
    <div x-show="showSourcesModal" class="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-6" x-cloak x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100">
        <div class="fixed inset-0" style="background:rgba(0,0,0,0.2);backdrop-filter:blur(8px)" @click="closeSources()"></div>
        <div class="relative w-full sm:max-w-lg max-h-[85vh] sm:max-h-[75vh] bg-surface border border-border rounded-t-2xl sm:rounded-2xl shadow-xl flex flex-col overflow-hidden z-10"
             x-transition:enter="transition ease-out duration-250" x-transition:enter-start="opacity-0 translate-y-6 sm:translate-y-4 sm:scale-95" x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100">
            <div class="flex items-center justify-between px-5 py-4 border-b border-border shrink-0">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-xl bg-accent-bg flex items-center justify-center">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="color:var(--accent)"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    </div>
                    <span class="font-semibold" style="color:var(--text-primary)">Sources</span>
                    <span class="text-sm" style="color:var(--text-muted)" x-text="`(${activeSources.length})`"></span>
                </div>
                <button class="w-8 h-8 rounded-xl flex items-center justify-center" style="color:var(--text-muted)" @click="closeSources()" @mouseenter="$el.style.color='var(--text-secondary)'" @mouseleave="$el.style.color='var(--text-muted)'">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="flex-1 overflow-y-auto p-3 space-y-2">
                <template x-for="(src, i) in activeSources" :key="i">
                    <a :href="src.url" target="_blank" rel="noopener noreferrer"
                       class="flex items-start gap-3 p-3.5 rounded-xl border border-border transition-all duration-200 group"
                       style="border-color:var(--border);transition:all 0.2s ease"
                       @mouseenter="$el.style.borderColor='rgba(139,92,246,0.3)';$el.style.background='var(--accent-bg)'"
                       @mouseleave="$el.style.borderColor='var(--border)';$el.style.background=''">
                        <div class="w-8 h-8 rounded-lg bg-warm shrink-0 flex items-center justify-center overflow-hidden border border-border">
                            <img :src="'https://www.google.com/s2/favicons?domain=' + getDomain(src.url) + '&sz=64'" :alt="getDomain(src.url)" class="w-5 h-5" loading="lazy" @error="$el.style.display='none'">
                        </div>
                        <div class="min-w-0 flex-1">
                            <div class="text-sm font-medium truncate" style="color:var(--text-primary)" x-text="src.title"></div>
                            <div class="text-xs" style="color:var(--text-muted)" x-text="getDomain(src.url)"></div>
                            <div class="text-xs" style="color:var(--text-muted)" x-text="src.snippet"></div>
                        </div>
                        <svg class="shrink-0 mt-1" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="color:var(--text-muted);opacity:0" :style="hover ? 'opacity:1' : 'opacity:0'"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                    </a>
                </template>
                <p x-show="activeSources.length === 0" class="text-sm text-center py-10" style="color:var(--text-muted)">No sources available</p>
            </div>
        </div>
    </div>

    <!-- Auth Screen -->
    <div x-show="showAuth" class="fixed inset-0 z-40 flex items-center justify-center p-4" x-cloak>
        <div class="absolute inset-0" style="background:var(--bg-warm)">
            <div class="absolute inset-0" style="background:radial-gradient(circle at center, rgba(139,92,246,0.03) 0%, transparent 70%)"></div>
            <div class="absolute top-1/4 left-1/2" style="transform:translate(-50%,0);width:600px;height:600px;background:rgba(139,92,246,0.03);border-radius:50%;filter:blur(120px)"></div>
        </div>
        <div class="relative w-full max-w-sm">
            <template x-if="authLoading">
                <div class="text-center">
                    <div class="skeleton" style="width:56px;height:56px;border-radius:16px;margin:0 auto 24px"></div>
                    <div class="skeleton" style="height:32px;width:60%;margin:0 auto 12px;border-radius:8px"></div>
                    <div class="skeleton" style="height:16px;width:40%;margin:0 auto 40px;border-radius:4px"></div>
                    <div class="skeleton" style="height:48px;width:100%;margin:0 0 12px;border-radius:12px"></div>
                    <div class="skeleton" style="height:48px;width:100%;margin:0 0 12px;border-radius:12px"></div>
                    <div class="skeleton" style="height:48px;width:100%;border-radius:12px"></div>
                </div>
            </template>
            <template x-if="!authLoading">
                <div class="auth-card text-center">
                    <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-accent to-accent-dark flex items-center justify-center text-xl font-bold text-white mx-auto mb-6 animate-float" style="box-shadow:0 8px 32px rgba(139,92,246,0.25)">Mk</div>
                    <h1 class="text-2xl font-bold tracking-tight mb-1.5" style="color:var(--text-primary)">Welcome back</h1>
                    <p class="text-sm mb-8" style="color:var(--text-muted)">Sign in to continue to MKCode</p>
                    <div class="space-y-3 mb-6">
                        <button class="oauth-btn">
                            <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                            Continue with Google
                        </button>
                        <button class="oauth-btn">
                            <svg width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.39.6.11.82-.26.82-.58 0-.28-.01-1.04-.02-2.05-3.34.72-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.75.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.84 2.8 1.31 3.49 1 .1-.78.42-1.31.76-1.61-2.66-.3-5.46-1.33-5.46-5.93 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23.96-.27 1.98-.4 3-.41 1.02.01 2.04.14 3 .41 2.29-1.55 3.3-1.23 3.3-1.23.66 1.66.24 2.88.12 3.18.77.84 1.23 1.91 1.23 3.22 0 4.61-2.8 5.63-5.48 5.92.43.37.82 1.1.82 2.22 0 1.61-.01 2.9-.01 3.3 0 .32.22.7.84.57C20.57 21.8 24 17.3 24 12 24 5.37 18.63 0 12 0z"/></svg>
                            Continue with GitHub
                        </button>
                    </div>
                    <div class="flex items-center gap-4 mb-6">
                        <div class="flex-1" style="height:1px;background:var(--border)"></div>
                        <span class="text-sm font-medium" style="color:var(--text-muted)">or</span>
                        <div class="flex-1" style="height:1px;background:var(--border)"></div>
                    </div>
                    <div class="space-y-4">
                        <div class="text-left">
                            <label class="text-sm font-medium mb-1.5 block" style="color:var(--text-secondary)">Email</label>
                            <input type="email" class="input-field" placeholder="m@example.com" x-model="authEmail" :class="{ 'error': authError }">
                        </div>
                        <div class="text-left">
                            <label class="text-sm font-medium mb-1.5 block" style="color:var(--text-secondary)">Password</label>
                            <input type="password" class="input-field" placeholder="Enter your password" x-model="authPassword" :class="{ 'error': authError }">
                        </div>
                    </div>
                    <div class="flex justify-end mt-2 mb-6">
                        <button class="text-sm font-medium bg-transparent border-none cursor-pointer" style="color:var(--accent)">Forgot password?</button>
                    </div>
                    <button class="btn-primary w-full flex items-center justify-center gap-2" :disabled="!authEmail || !authPassword">
                        <span x-show="authSubmitting" class="spinner-sm spinner-white"></span>
                        <span x-text="authSubmitting ? 'Signing in...' : 'Sign in'"></span>
                    </button>
                    <p class="text-sm mt-6" style="color:var(--text-muted)">
                        Don't have an account?
                        <button class="font-medium bg-transparent border-none cursor-pointer" style="color:var(--accent)">Sign up</button>
                    </p>
                </div>
            </template>
        </div>
    </div>

    <!-- Sidebar Overlay -->
    <div x-show="sidebarOpen" class="fixed inset-0 z-20 md:hidden" style="background:rgba(0,0,0,0.08);backdrop-filter:blur(4px)" @click="sidebarOpen = false" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"></div>

    <!-- App Layout -->
    <div style="display:flex;height:100dvh;width:100%;overflow:hidden">

        <!-- Sidebar -->
        <aside class="sidebar" style="width:280px;min-width:280px;display:flex;flex-direction:column;z-index:30;position:fixed;top:0;bottom:0;left:0;transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);box-shadow:0 4px 24px rgba(0,0,0,0.08)"
               :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
               x-init="window.innerWidth > 768 ? $el.style.transform = 'translateX(0)' : ''">
            <div style="display:none" class="md:contents">
                <style>
                    @media (min-width: 768px) {
                        .sidebar { transform: translateX(0) !important; position: relative !important; box-shadow: none !important; }
                    }
                </style>
            </div>
            <div class="flex items-center justify-between px-4" style="height:56px;border-bottom:1px solid var(--border)">
                <div class="flex items-center gap-3">
                    <div class="w-7 h-7 rounded-xl bg-gradient-to-br from-accent to-accent-dark flex items-center justify-center text-white" style="box-shadow:0 2px 6px rgba(139,92,246,0.2)">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                    </div>
                    <span class="font-semibold tracking-tight" style="font-size:14px;background:linear-gradient(135deg,var(--accent),var(--accent-dark));-webkit-background-clip:text;-webkit-text-fill-color:transparent">MKCode</span>
                </div>
                <button class="md:hidden w-8 h-8 rounded-xl flex items-center justify-center bg-transparent border-none cursor-pointer" style="color:var(--text-muted)" @click="sidebarOpen = false">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>

            <div class="p-3">
                <button class="new-chat-btn" @click="newChat">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    New chat
                </button>
            </div>

            <div class="flex-1 overflow-y-auto px-2 space-y-0.5 sidebar-chats">
                <template x-for="chat in chats" :key="chat.id">
                    <div class="chat-item group"
                         :class="{ 'active': chat.id === currentChatId }"
                         @click="selectChat(chat.id)">
                        <svg class="shrink-0" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="color:var(--text-muted)"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        <span class="truncate flex-1 text-sm" x-text="chat.title || 'New chat'"></span>
                        <button class="opacity-0 group-hover:opacity-100 p-1 rounded-lg bg-transparent border-none cursor-pointer" style="color:var(--text-muted);transition:all 0.15s" @click.stop="deleteChat(chat.id, $event)">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                        </button>
                    </div>
                </template>
                <div x-show="chats.length === 0" class="text-center py-10">
                    <p class="text-sm" style="color:var(--text-muted)">No conversations yet</p>
                </div>
            </div>

            <div class="px-4 py-3.5 flex items-center gap-2.5 shrink-0" style="border-top:1px solid var(--border)">
                <div style="width:8px;height:8px;border-radius:50%;background:#10B981;box-shadow:0 0 6px rgba(16,185,129,0.3)"></div>
                <span class="text-xs" style="color:var(--text-muted)">MKCode v1.0</span>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col min-w-0" style="position:relative">
            <div class="absolute inset-0 pointer-events-none" style="background:radial-gradient(ellipse at top left, rgba(139,92,246,0.015) 0%, transparent 60%)"></div>
            <div class="absolute top-0 left-1/4 pointer-events-none" style="width:500px;height:500px;background:rgba(139,92,246,0.02);border-radius:50%;filter:blur(150px)"></div>

            <!-- Header -->
            <header class="flex items-center justify-between px-4 shrink-0 sticky top-0 z-10" style="height:56px;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.7);backdrop-filter:blur(16px)">
                <div class="flex items-center gap-3">
                    <button class="md:hidden w-9 h-9 rounded-xl flex items-center justify-center bg-transparent border-none cursor-pointer" style="color:var(--text-muted)" @click="sidebarOpen = true">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                    <div x-show="currentChatId" class="flex items-center gap-2 animate-fade-in">
                        <span class="text-xs" style="color:var(--text-muted)" x-text="model"></span>
                        <span style="width:4px;height:4px;border-radius:50%;background:var(--border)"></span>
                        <span class="text-xs" style="color:var(--text-muted)" x-text="messages.length + ' messages'"></span>
                    </div>
                </div>
                <div class="flex items-center gap-1">
                    <button class="hidden md:flex w-9 h-9 rounded-xl items-center justify-center bg-transparent border-none cursor-pointer" style="color:var(--text-muted)" @click="sidebarOpen = !sidebarOpen">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                </div>
            </header>

            <!-- Messages -->
            <div class="flex-1 overflow-y-auto msg-container" x-ref="chatContainer">
                <div style="max-width:768px;margin:0 auto;padding:32px 16px 48px">

                    <!-- Welcome -->
                    <div x-show="!currentChatId && messages.length === 0" class="flex flex-col items-center justify-center text-center animate-fade-in" style="min-height:65vh;padding:0 16px">
                        <div style="position:relative;margin-bottom:32px">
                            <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-accent to-accent-dark flex items-center justify-center text-white animate-float" style="position:relative;z-index:10;box-shadow:0 8px 32px rgba(139,92,246,0.25)">
                                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                            </div>
                            <div style="position:absolute;inset:0;width:64px;height:64px;border-radius:16px;background:rgba(139,92,246,0.1);filter:blur(24px);animation:3s ease-in-out infinite pulse-slow"></div>
                        </div>
                        <h1 class="text-3xl sm:text-4xl font-bold tracking-tight mb-2 text-gradient-brand">MKCode</h1>
                        <p style="color:var(--text-muted);margin-bottom:40px">AI-powered agent platform</p>
                        <div style="display:grid;grid-template-columns:repeat(1,1fr);gap:12px;width:100%;max-width:512px" class="sm:grid-cols-2">
                            <button class="suggestion-card" @click="selectSuggestion('Build a React todo app with dark mode and local storage')">
                                <div class="w-9 h-9 rounded-xl bg-accent-bg flex items-center justify-center mb-3">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="color:var(--accent)"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                                </div>
                                <span class="text-sm font-medium" style="color:var(--text-primary)">Build a React app</span>
                                <span class="text-xs mt-1" style="color:var(--text-muted);display:block">With dark mode & persistence</span>
                            </button>
                            <button class="suggestion-card" @click="selectSuggestion('Latest AI agent frameworks 2026')">
                                <div class="w-9 h-9 rounded-xl bg-accent-bg flex items-center justify-center mb-3">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="color:var(--accent)"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
                                </div>
                                <span class="text-sm font-medium" style="color:var(--text-primary)">Research AI frameworks</span>
                                <span class="text-xs mt-1" style="color:var(--text-muted);display:block">Latest trends & comparisons</span>
                            </button>
                            <button class="suggestion-card" @click="selectSuggestion('Create a FastAPI backend with async endpoints')">
                                <div class="w-9 h-9 rounded-xl bg-accent-bg flex items-center justify-center mb-3">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="color:var(--accent)"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                                </div>
                                <span class="text-sm font-medium" style="color:var(--text-primary)">FastAPI backend</span>
                                <span class="text-xs mt-1" style="color:var(--text-muted);display:block">Async endpoints & best practices</span>
                            </button>
                            <button class="suggestion-card" @click="selectSuggestion('Explain and implement quicksort')">
                                <div class="w-9 h-9 rounded-xl bg-accent-bg flex items-center justify-center mb-3">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="color:var(--accent)"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
                                </div>
                                <span class="text-sm font-medium" style="color:var(--text-primary)">Algorithm</span>
                                <span class="text-xs mt-1" style="color:var(--text-muted);display:block">Quicksort explained & coded</span>
                            </button>
                        </div>
                    </div>

                    <!-- Message List -->
                    <template x-for="(msg, i) in messages" :key="msg.id">
                        <div class="mb-6 last:mb-0 msg-enter" :style="`--delay: ${i * 0.05}s`">
                            <div class="flex gap-3 items-start w-full" :class="msg.role === 'user' ? 'flex-row-reverse' : ''">
                                <!-- Avatar -->
                                <div class="w-6 h-6 rounded-full shrink-0 mt-1"
                                     :class="msg.role === 'user'
                                        ? 'bg-gradient-to-br from-accent to-accent-dark'
                                        : 'bg-accent-bg'"
                                     :style="msg.role === 'user' ? 'box-shadow:0 2px 6px rgba(139,92,246,0.2)' : 'border:1.5px solid rgba(139,92,246,0.2)'"></div>

                                <!-- Content -->
                                <div style="min-width:0" :class="msg.role === 'user' ? 'max-w-[88%] sm:max-w-[80%]' : 'w-full max-w-[88%] sm:max-w-[80%]'">

                                    <!-- Thinking (active) -->
                                    <template x-if="msg.role === 'assistant' && i === messages.length - 1">
                                        <div>
                                            <div x-show="isThinking && thinkingContent" class="thinking-block mb-3">
                                                <div class="thinking-header">
                                                    <div class="flex items-center gap-2.5 flex-1">
                                                        <div class="flex gap-1">
                                                            <span class="w-2 h-2 rounded-full animate-think-dot" style="background:var(--accent)"></span>
                                                            <span class="w-2 h-2 rounded-full animate-think-dot" style="background:var(--accent);animation-delay:0.15s"></span>
                                                            <span class="w-2 h-2 rounded-full animate-think-dot" style="background:var(--accent);animation-delay:0.3s"></span>
                                                        </div>
                                                        <span class="text-xs font-medium" style="color:var(--accent)">Thinking</span>
                                                        <span class="text-xs animate-pulse" style="color:var(--text-muted)">...</span>
                                                    </div>
                                                    <button @click="thinkingOpen = !thinkingOpen" class="bg-transparent border-none cursor-pointer" style="color:var(--text-muted)">
                                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
                                                    </button>
                                                </div>
                                                <div x-show="thinkingOpen" x-collapse.duration.200ms>
                                                    <div class="thinking-content text-sm" x-text="thinkingContent"></div>
                                                </div>
                                            </div>

                                            <div x-show="thinkingDone && thinkingContent && msg.content" class="mb-2">
                                                <button @click="thinkingOpen = !thinkingOpen" class="inline-flex items-center gap-1.5 text-xs font-medium cursor-pointer bg-transparent border-none px-3 py-1.5 rounded-lg" style="color:var(--text-muted)">
                                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
                                                    <span x-text="thinkingOpen ? 'Hide thinking' : 'Show thinking'"></span>
                                                </button>
                                                <div x-show="thinkingOpen" x-collapse.duration.200ms class="mt-1.5">
                                                    <div class="thinking-block">
                                                        <div class="thinking-content max-h-48 text-sm" x-text="thinkingContent"></div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </template>

                                    <!-- Response Label -->
                                    <div x-show="msg.role === 'assistant' && i === messages.length - 1 && thinkingDone && msg.content" class="final-badge mb-2" style="font-size:10px;padding:3px 8px">
                                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
                                        Response
                                    </div>

                                    <!-- User Bubble -->
                                    <div x-show="msg.role === 'user'" class="user-bubble leading-relaxed" style="font-size:13px">
                                        <div class="message-content" x-html="formatContent(msg.content)"></div>
                                    </div>

                                    <!-- Error with retry -->
                                    <div x-show="msg.role === 'assistant' && msg.content && msg.content.startsWith('Error:')" class="flex items-center gap-2 mt-1">
                                        <span class="text-xs" style="color:#EF4444">⚠</span>
                                        <span class="text-xs" style="color:var(--text-muted)">Failed to get response</span>
                                        <button @click="retryMessage(i)" class="text-xs font-medium px-2.5 py-1 rounded-lg bg-transparent border-none cursor-pointer" style="color:var(--accent);border:1px solid rgba(139,92,246,0.2)" @mouseenter="$el.style.background='var(--accent-bg)'" @mouseleave="$el.style.background=''">Retry</button>
                                    </div>

                                    <!-- Assistant Bubble -->
                                    <div x-show="msg.role === 'assistant'" class="assistant-bubble leading-relaxed" style="font-size:13px">
                                        <div class="message-content" x-html="formatContent(msg.content)"></div>

                                        <!-- Sources -->
                                        <template x-if="msg.sources && msg.sources.length > 0">
                                            <div class="mt-4 flex flex-wrap gap-2">
                                                <template x-for="(src, si) in msg.sources.slice(0, 4)" :key="si">
                                                    <a :href="src.url" target="_blank" rel="noopener noreferrer"
                                                       class="source-chip">
                                                        <img :src="'https://www.google.com/s2/favicons?domain=' + getDomain(src.url) + '&sz=32'" style="width:16px;height:16px;border-radius:4px" loading="lazy" @error="$el.style.display='none'" :alt="getDomain(src.url)">
                                                        <span style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" x-text="getDomain(src.url)"></span>
                                                    </a>
                                                </template>
                                                <button x-show="msg.sources.length > 4"
                                                        @click="openSources(msg.sources)"
                                                        class="source-chip-more">
                                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                                                    +<span x-text="msg.sources.length - 4"></span>
                                                </button>
                                            </div>
                                        </template>

                                        <!-- Actions -->
                                        <div x-show="msg.role === 'assistant' && msg.content && !(i === messages.length - 1 && streaming)"
                                             class="mt-3 flex items-center gap-1 message-actions">
                                            <button @click="toggleLike(i)" class="action-btn" :class="msg.liked ? 'active-like' : ''">
                                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>
                                            </button>
                                            <button @click="toggleDislike(i)" class="action-btn" :class="msg.disliked ? 'active-dislike' : ''">
                                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3z"/><line x1="17" y1="2" x2="20" y2="2"/></svg>
                                            </button>
                                            <button @click="regenerateLast()" class="action-btn">
                                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                                            </button>
                                            <button @click="retryLast()" class="action-btn" title="Retry">
                                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
                                            </button>
                                            <button x-show="msg.sources && msg.sources.length > 0" @click="openSources(msg.sources)" class="action-btn">
                                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>

                    <!-- Searching -->
                    <div x-show="isSearching" class="flex gap-3 mb-6 msg-enter">
                        <div class="w-7 h-7 rounded-xl bg-gradient-to-br from-accent to-accent-dark flex items-center justify-center text-white shrink-0" style="box-shadow:0 2px 6px rgba(139,92,246,0.2)">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        </div>
                        <div class="flex items-center gap-3 pt-1">
                            <div style="position:relative;width:20px;height:20px;display:flex;align-items:center;justify-content:center">
                                <svg style="animation:search-spin 1s linear infinite" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" :style="'color:' + accent">
                                    <circle cx="11" cy="11" r="8" stroke-dasharray="32" stroke-dashoffset="32"/>
                                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                                </svg>
                            </div>
                            <span class="text-sm font-medium" style="color:var(--text-secondary)">Searching the web</span>
                            <div class="flex gap-1">
                                <span class="w-1.5 h-1.5 rounded-full animate-bounce" style="background:var(--accent);animation-delay:0s"></span>
                                <span class="w-1.5 h-1.5 rounded-full animate-bounce" style="background:var(--accent);animation-delay:0.15s"></span>
                                <span class="w-1.5 h-1.5 rounded-full animate-bounce" style="background:var(--accent);animation-delay:0.3s"></span>
                            </div>
                        </div>
                    </div>

                    <!-- Typing -->
                    <div x-show="streaming && !isThinking && !isSearching" class="flex gap-3 mb-6 msg-enter">
                        <div class="w-7 h-7 rounded-xl bg-gradient-to-br from-accent to-accent-dark flex items-center justify-center text-white shrink-0" style="box-shadow:0 2px 6px rgba(139,92,246,0.2)">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                        </div>
                        <div class="flex items-center gap-1.5 pt-2">
                            <span class="w-2 h-2 rounded-full animate-bounce" style="background:var(--accent);animation-delay:0s;opacity:0.5"></span>
                            <span class="w-2 h-2 rounded-full animate-bounce" style="background:var(--accent);animation-delay:0.15s;opacity:0.5"></span>
                            <span class="w-2 h-2 rounded-full animate-bounce" style="background:var(--accent);animation-delay:0.3s;opacity:0.5"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Input -->
            <div style="border-top:1px solid var(--border);background:rgba(255,255,255,0.7);backdrop-filter:blur(16px);padding:12px 12px 16px;flex-shrink:0">
                <div style="max-width:768px;margin:0 auto">
                    <div class="flex items-center gap-2 mb-2.5 px-1">
                        <button class="toggle-btn" :class="{ 'active': searchEnabled }" @click="searchEnabled = !searchEnabled">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                            Search
                        </button>
                        <button class="toggle-btn" :class="{ 'active': agentsEnabled }" @click="agentsEnabled = !agentsEnabled">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 2a4 4 0 0 0-4 4v2h8V6a4 4 0 0 0-4-4z"/><path d="M16 8v2a4 4 0 0 1-8 0V8"/><path d="M4 14h16v2a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4v-2z"/></svg>
                            Agents
                        </button>
                        <div class="flex-1"></div>
                        <span class="text-[11px]" style="color:var(--text-muted);opacity:0.6" x-show="!streaming && currentChatId">Shift+Enter for new line</span>
                    </div>
                    <div class="input-area">
                        <textarea x-model="input"
                                  @keydown.enter.prevent="if(!$event.shiftKey) sendMessage()"
                                  placeholder="Message MKCode..."
                                  rows="1"
                                  x-ref="textarea"
                                  :disabled="streaming"
                                  class="input-textarea"
                                  @input="$refs.textarea.style.height = 'auto'; $refs.textarea.style.height = Math.min($refs.textarea.scrollHeight, 192) + 'px'">
                        </textarea>
                        <button @click="sendMessage" :disabled="!input.trim() || streaming"
                                class="send-btn"
                                :class="input.trim() && !streaming ? 'active' : ''">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                        </button>
                    </div>
                    <p class="text-[11px] text-center mt-2" style="color:var(--text-muted);opacity:0.5">
                        MKCode may produce inaccurate information.
                        <span x-show="searchEnabled" class="font-medium" style="color:var(--accent)">· Web search on</span>
                        <span x-show="agentsEnabled" class="font-medium" style="color:var(--accent)">· Agents on</span>
                    </p>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
